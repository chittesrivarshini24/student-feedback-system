<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART ONLINE SURVEY SYSTEM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="glass-form-container animate__animated animate__fadeInUp">
        <form id="registerForm">
            <h2>Create Account</h2>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required placeholder="student@university.edu">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-btn">Register</button>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
